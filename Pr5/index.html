<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESP32 Sound Graph</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h2>Sound Level (WebSocket)</h2>
  <canvas id="chart" width="600" height="250"></canvas>

  <script>
    const ctx = document.getElementById('chart').getContext('2d');

    const data = {
      labels: [],
      datasets: [{
        label: 'Sound Level',
        data: [],
        tension: 0.2
      }]
    };

    const chart = new Chart(ctx, {
      type: 'line',
      data: data,
      options: {
        animation: false,
        scales: {
          y: {
            min: 0,
            max: 2000
          }
        }
      }
    });

    // 🔌 Connect to WebSocket
    const ws = new WebSocket("ws://192.168.0.117/ws"); // CHANGE IP

    ws.onmessage = (event) => {
      const value = parseInt(event.data);

      // add new data
      data.labels.push('');
      data.datasets[0].data.push(value);

      // keep last 50 points
      if (data.labels.length > 50) {
        data.labels.shift();
        data.datasets[0].data.shift();
      }

      chart.update();
    };

    ws.onopen = () => console.log("Connected");
    ws.onerror = (e) => console.log("Error", e);
  </script>
</body>
</html>
